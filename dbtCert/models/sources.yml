sources:
  - name: airbnb # database name
    schema: raw # schema name
    tables:
      - name: listings # the given name for dbt convinience
        identifier: raw_listings # the actual name in the database

      - name: hosts
        identifier: raw_hosts

      - name: reviews
        identifier: raw_reviews
        config:
          loaded_at_field: date
          freshness:
            warn_after: {count: 1, period: hour}
            error_after: {count: 24, period: hour}